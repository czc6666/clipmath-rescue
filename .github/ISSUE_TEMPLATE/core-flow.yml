name: 核心流程反馈
description: 只提交脱敏结果，不要粘贴文章正文、私人链接或公式内容。
title: "[反馈] 公式抢救结果"
labels: ["user-feedback"]
body:
  - type: markdown
    attributes:
      value: |
        感谢验证。请只填写脱敏结果；不要贴文章正文、私人 URL、Cookie、Token 或公司数据。
  - type: input
    id: converted
    attributes:
      label: 工具显示转换了多少个公式？
      placeholder: 例如：210
    validations:
      required: true
  - type: dropdown
    id: clipper
    attributes:
      label: 你随后使用了哪个剪藏器？
      options:
        - Obsidian Web Clipper
        - MarkDownload / MarkSnip
        - 其他
    validations:
      required: true
  - type: dropdown
    id: outcome
    attributes:
      label: 剪藏后的公式是否正常？
      options:
        - 全部正常
        - 部分正常
        - 仍然丢失或损坏
    validations:
      required: true
  - type: textarea
    id: detail
    attributes:
      label: 一个具体反馈或继续使用要求
      description: 请脱敏，不要贴正文或私人链接。
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: 隐私确认
      options:
        - label: 我没有提交文章正文、私人链接、凭证或公司数据。
          required: true
